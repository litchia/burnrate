<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Rounded square background with burn-colored gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7A3D"/>
      <stop offset="1" stop-color="#E8342E"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE27A"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Three ascending dashboard bars (white) -->
  <rect x="26" y="74" width="18" height="32" rx="3" fill="#FFFFFF" opacity="0.95"/>
  <rect x="55" y="58" width="18" height="48" rx="3" fill="#FFFFFF" opacity="0.95"/>
  <rect x="84" y="38" width="18" height="68" rx="3" fill="#FFFFFF" opacity="0.95"/>

  <!-- Flame tip on tallest bar -->
  <path d="M93 38
           C 87 30, 96 26, 92 18
           C 102 22, 106 32, 102 38
           C 104 34, 107 33, 108 35
           C 109 38, 104 40, 101 38 Z"
        fill="url(#flame)"/>

  <!-- Baseline -->
  <rect x="22" y="106" width="84" height="3" rx="1.5" fill="#FFFFFF" opacity="0.7"/>
</svg>
