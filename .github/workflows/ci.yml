name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Verify webview assets are shippable
        # Catch path-case / line-ending bugs that only surface on Windows
        # by asserting the files the extension reads at runtime exist
        # exactly as referenced.
        shell: bash
        run: |
          test -f out/extension.js
          test -f src/webview/index.html
          test -f src/webview/main.js
