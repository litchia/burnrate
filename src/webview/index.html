<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{NONCE}}'; img-src data:;" />
    <title>BurnRate</title>
    <style>
      /* =========================================================
       * BurnRate — burn metaphor dashboard
       * Tokens, layout, and component styles in one block. The
       * webview renderer (main.js) generates DOM that targets the
       * class names below; nothing here is unused. Theme variables
       * follow the design handoff (OKLCH-driven warm dark + cream
       * light), with the `body.vscode-light` hook for VS Code's
       * theme switcher and `prefers-color-scheme` for the browser
       * (CLI server) context.
       * ========================================================= */

      /* ---- Palette resolution -----------------------------------
       * The renderer in main.js writes one of three values to the
       * `<html data-theme>` attribute on every render:
       *   - "dark"  → force dark (user clicked Dark)
       *   - "light" → force light (user clicked Light)
       *   - "auto"  → resolve at boot from VS Code body class or
       *               (prefers-color-scheme), then write the resolved
       *               concrete value back. So by the time CSS runs we
       *               always see "dark" or "light" — no conditional
       *               specificity battles, no media-query layering.
       *
       * Surfaces are deliberately near-neutral (chroma ≈ 0.003) so the
       * saturated fire accent reads as INTENT, not ambient heat. The
       * fire ramp itself stays fully saturated. */
      :root {
        --fire-1: oklch(0.78 0.16 80);
        --fire-2: oklch(0.72 0.18 50);
        --fire-3: oklch(0.62 0.22 30);
        --fire-4: oklch(0.50 0.18 25);

        --claude: oklch(0.68 0.13 255);
        --codex: oklch(0.74 0.16 145);
        --warn: oklch(0.68 0.18 70);
        --danger: oklch(0.65 0.22 25);

        --radius: 6px;
        --radius-lg: 10px;

        --font-sans:
          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI Variable Display",
          "Segoe UI", system-ui, "Helvetica Neue", "Noto Sans SC", sans-serif;
        --font-mono:
          "JetBrains Mono", ui-monospace, "SF Mono", "Cascadia Mono", Menlo,
          Consolas, monospace;

        /* Dark by default — main.js may overwrite via data-theme. */
        --bg: oklch(0.135 0.003 60);
        --bg-elev: oklch(0.175 0.003 60);
        --bg-elev-2: oklch(0.215 0.003 60);
        --line: oklch(0.275 0.004 60);
        --line-soft: oklch(0.235 0.003 60);
        --text: oklch(0.96 0.005 80);
        --text-dim: oklch(0.72 0.005 60);
        --text-mute: oklch(0.55 0.005 60);
        color-scheme: dark;
      }

      :root[data-theme="dark"] {
        --bg: oklch(0.135 0.003 60);
        --bg-elev: oklch(0.175 0.003 60);
        --bg-elev-2: oklch(0.215 0.003 60);
        --line: oklch(0.275 0.004 60);
        --line-soft: oklch(0.235 0.003 60);
        --text: oklch(0.96 0.005 80);
        --text-dim: oklch(0.72 0.005 60);
        --text-mute: oklch(0.55 0.005 60);
        color-scheme: dark;
      }

      :root[data-theme="light"] {
        --bg: oklch(0.985 0.003 80);
        --bg-elev: oklch(1 0 0);
        --bg-elev-2: oklch(0.965 0.003 80);
        --line: oklch(0.90 0.004 70);
        --line-soft: oklch(0.94 0.003 70);
        --text: oklch(0.20 0.005 50);
        --text-dim: oklch(0.42 0.005 50);
        --text-mute: oklch(0.58 0.005 50);
        color-scheme: light;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "ss01", "cv11";
      }
      .mono {
        font-family: var(--font-mono);
        font-feature-settings: "tnum", "zero";
      }
      .dim { color: var(--text-dim); }
      .mute { color: var(--text-mute); }

      /* ---- Layout shell ------------------------------------- */
      .app {
        max-width: 1320px;
        margin: 0 auto;
        padding: 28px 32px 80px;
      }

      /* ---- Topbar ------------------------------------------- */
      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--line-soft);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background:
          radial-gradient(
            circle at 50% 70%,
            var(--fire-1) 0%,
            var(--fire-2) 35%,
            var(--fire-3) 60%,
            var(--fire-4) 80%,
            transparent 100%
          ),
          var(--bg-elev-2);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 24px -6px oklch(0.72 0.18 50 / 0.5),
          inset 0 0 0 1px var(--line);
      }
      .brand-mark::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 80%,
          oklch(1 0 0 / 0.4) 0%,
          transparent 30%
        );
        mix-blend-mode: screen;
      }
      .brand-name {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .brand-sub {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-mute);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .toprow-r {
        display: flex;
        align-items: center;
        gap: 14px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-dim);
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .synced-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--codex);
        box-shadow: 0 0 8px var(--codex);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50%       { opacity: 1; }
      }
      .lang-seg {
        display: inline-flex;
        background: var(--bg-elev);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 2px;
        margin-left: 6px;
      }
      .lang-seg button {
        appearance: none;
        background: transparent;
        border: 0;
        padding: 4px 10px;
        border-radius: 4px;
        color: var(--text-mute);
        font-family: var(--font-mono);
        font-size: 11.5px;
        cursor: pointer;
        transition: 0.12s;
      }
      .lang-seg button:hover { color: var(--text); }
      .lang-seg button.active {
        background: var(--bg-elev-2);
        color: var(--text);
        box-shadow: 0 0 0 1px var(--line);
      }
      /* Theme picker reuses .lang-seg; just slightly tighter to keep the
       * topbar from getting noisy when the labels are short. */
      .lang-seg.theme-seg button { padding: 4px 8px; }

      /* ---- Filter row --------------------------------------- */
      .filterbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 0;
        border-bottom: 1px solid var(--line-soft);
        flex-wrap: wrap;
      }
      .seg {
        display: inline-flex;
        background: var(--bg-elev);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 3px;
        gap: 2px;
      }
      .seg button {
        appearance: none;
        background: transparent;
        border: 0;
        padding: 6px 12px;
        border-radius: 5px;
        color: var(--text-dim);
        font-family: var(--font-sans);
        font-size: 12.5px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.12s;
      }
      .seg button:hover { color: var(--text); }
      .seg button.active {
        background: var(--bg-elev-2);
        color: var(--text);
        box-shadow: 0 0 0 1px var(--line);
      }
      .seg button.fire.active {
        background: linear-gradient(180deg, var(--fire-2), var(--fire-3));
        color: oklch(0.16 0.005 60);
        box-shadow:
          0 0 0 1px oklch(0.62 0.22 30 / 0.35),
          inset 0 1px 0 oklch(1 0 0 / 0.25);
      }
      :root[data-theme="light"] .seg button.fire.active {
        color: oklch(0.99 0 0);
      }
      .filter-meta {
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--text-mute);
        margin-left: auto;
      }
      .notice {
        margin-top: 16px;
        padding: 12px 14px;
        border-left: 2px solid var(--fire-2);
        background: oklch(0.72 0.18 50 / 0.06);
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--text-dim);
        border-radius: 0 6px 6px 0;
      }

      /* ---- Burn-rate hero ----------------------------------- */
      .burnhero {
        margin-top: 22px;
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 16px;
      }
      .burn-main {
        position: relative;
        background: var(--bg-elev);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 22px 24px;
        overflow: hidden;
      }
      /* A single restrained warm wash in the top-right corner — enough
       * to mark this card as "the burn one" without bathing it in heat. */
      .burn-main::after {
        content: "";
        position: absolute;
        inset: -2px -2px auto -2px;
        height: 90px;
        background: radial-gradient(
          ellipse at 88% -10%,
          var(--fire-2) 0%,
          transparent 60%
        );
        opacity: 0.10;
        pointer-events: none;
      }
      :root[data-theme="light"] .burn-main::after {
        opacity: 0.16;
      }
      .burn-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-mute);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .burn-label .fire-icon { color: var(--fire-2); }
      .burn-rate {
        display: flex;
        align-items: baseline;
        gap: 14px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .burn-rate .v {
        font-family: var(--font-mono);
        font-size: 56px;
        font-weight: 600;
        letter-spacing: -0.03em;
        background: linear-gradient(
          180deg,
          var(--fire-1) 0%,
          var(--fire-2) 60%,
          var(--fire-3) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        line-height: 1;
      }
      .burn-rate .unit {
        font-family: var(--font-mono);
        font-size: 14px;
        color: var(--text-dim);
      }
      .burn-rate .delta {
        font-family: var(--font-mono);
        font-size: 13px;
        padding: 3px 8px;
        border-radius: 4px;
        background: oklch(0.65 0.20 25 / 0.15);
        color: oklch(0.78 0.18 30);
        border: 1px solid oklch(0.55 0.18 25 / 0.4);
      }
      .burn-rate .delta.down {
        background: oklch(0.65 0.13 145 / 0.15);
        color: var(--codex);
        border-color: oklch(0.55 0.13 145 / 0.4);
      }
      .burn-sub {
        margin-top: 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-dim);
      }
      .burn-spark {
        margin-top: 18px;
        height: 86px;
        position: relative;
      }
      .burn-spark svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .burn-side-grid {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 16px;
      }
      .burn-side {
        background: var(--bg-elev);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 18px 20px;
      }
      .budget-bar {
        margin-top: 14px;
        height: 10px;
        border-radius: 999px;
        background: var(--bg-elev-2);
        border: 1px solid var(--line);
        position: relative;
        overflow: hidden;
      }
      .budget-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--fire-1),
          var(--fire-2) 50%,
          var(--fire-3)
        );
        position: relative;
        border-radius: 999px;
      }
      .budget-fill::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          oklch(1 0 0 / 0.2),
          transparent 50%
        );
      }
      .budget-marker {
        position: absolute;
        top: -4px;
        bottom: -4px;
        width: 2px;
        background: var(--text);
        opacity: 0.6;
      }
      .budget-meta {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--text-mute);
        margin-top: 8px;
      }
      .top-project-bar {
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
        display: flex;
        gap: 2px;
        background: var(--bg-elev-2);
        border: 1px solid var(--line);
        margin-top: 12px;
      }
      .top-project-bar > i {
        display: block;
        height: 100%;
      }
      .top-project-bar > i.claude {
        background: linear-gradient(
          90deg,
          oklch(0.6 0.13 255),
          var(--claude)
        );
      }
      .top-project-bar > i.codex {
        background: linear-gradient(
          90deg,
          oklch(0.65 0.16 145),
          var(--codex)
        );
      }

      /* ---- Stat strip --------------------------------------- */
      .stat-strip {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: var(--line-soft);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      .stat {
        background: var(--bg-elev);
        padding: 16px 18px;
      }
      .stat .k {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-mute);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .stat .v {
        font-family: var(--font-mono);
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-top: 6px;
        color: var(--text);
      }
      .stat .sub {
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--text-dim);
        margin-top: 4px;
      }
      .stat .split {
        display: flex;
        gap: 10px;
        margin-top: 8px;
        font-family: var(--font-mono);
        font-size: 11.5px;
        flex-wrap: wrap;
      }
      .stat .split span {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--text-dim);
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
      }
      .dot.claude { background: var(--claude); }
      .dot.codex  { background: var(--codex); }

      /* ---- Section heading ---------------------------------- */
      .section { margin-top: 36px; }
      .section-h {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .section-h h2 {
        font-size: 13px;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-h h2::before {
        content: "";
        width: 12px;
        height: 1px;
        background: var(--fire-2);
      }
      .section-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      /* ---- Heatmap ------------------------------------------ */
      .heatmap-card {
        background: var(--bg-elev);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 22px;
        display: grid;
        grid-template-columns: auto 1px 1fr;
        gap: 24px;
        align-items: start;
      }
      .heatmap-grid {
        display: grid;
        grid-template-columns: repeat(7, 38px);
        grid-auto-rows: 38px;
        gap: 6px;
        font-family: var(--font-mono);
        font-size: 10.5px;
        justify-content: start;
      }
      .heatmap-grid .dow {
        height: 22px;
        color: var(--text-mute);
        text-align: center;
        padding: 4px 0;
      }
      .heatcell {
        width: 38px;
        height: 38px;
        border-radius: 4px;
        border: 1px solid oklch(0.28 0.02 50 / 0.4);
        background: var(--bg-elev-2);
        position: relative;
        cursor: pointer;
        transition: 0.12s;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-size: 9.5px;
        color: var(--text-mute);
      }
      .heatcell:hover {
        outline: 1px solid var(--fire-1);
        outline-offset: 1px;
        z-index: 2;
      }
      .heatcell.empty {
        background: transparent !important;
        border-color: transparent !important;
        cursor: default;
        pointer-events: none;
      }
      .heatcell.today {
        outline: 1px dashed var(--fire-1);
        outline-offset: 1px;
      }
      .heatmap-vsep {
        background: var(--line-soft);
        align-self: stretch;
      }
      .heatmap-detail { padding-left: 4px; }
      .heatmap-detail .day-label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-mute);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .heatmap-detail .day-date {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-top: 4px;
      }
      .heatmap-detail .day-amt {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-dim);
        margin-top: 4px;
      }
      .day-bd {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .day-bd .row {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-mono);
        font-size: 12px;
      }
      .day-bd .row .lbl {
        width: 80px;
        color: var(--text-mute);
      }
      .day-bd .row .bar {
        flex: 1;
        height: 6px;
        border-radius: 3px;
        background: var(--bg-elev-2);
        border: 1px solid var(--line);
        overflow: hidden;
        position: relative;
      }
      .day-bd .row .bar > i {
        display: block;
        height: 100%;
      }
      .day-bd .row .v {
        width: 80px;
        text-align: right;
        color: var(--text-dim);
      }
      .legend {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-mute);
      }
      .legend .scale { display: flex; gap: 2px; }
      .legend .scale i {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        display: block;
        border: 1px solid oklch(0.28 0.02 50 / 0.4);
      }

      /* ---- Project rows ------------------------------------- */
      .proj-list { display: flex; flex-direction: column; }
      .proj {
        border-top: 1px solid var(--line-soft);
        padding: 16px 4px;
        display: grid;
        grid-template-columns: 1.6fr 2fr auto;
        gap: 22px;
        align-items: center;
        cursor: pointer;
        transition: 0.12s;
      }
      .proj:first-child { border-top: 0; }
      .proj:hover {
        background: var(--bg-elev-2);
        border-radius: 6px;
      }
      .proj-head {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }
      .proj-path {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .proj-path .chev {
        color: var(--text-mute);
        transition: 0.15s;
      }
      .proj.open .chev { transform: rotate(90deg); }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 7px;
        border-radius: 4px;
        font-family: var(--font-mono);
        font-size: 10.5px;
        border: 1px solid var(--line);
        background: var(--bg-elev-2);
        color: var(--text-dim);
      }
      .tag.claude {
        color: var(--claude);
        border-color: oklch(0.55 0.13 255 / 0.4);
      }
      .tag.codex {
        color: var(--codex);
        border-color: oklch(0.55 0.13 145 / 0.4);
      }
      .tag.warn {
        color: var(--warn);
        border-color: oklch(0.55 0.18 70 / 0.4);
        background: oklch(0.72 0.18 70 / 0.08);
      }
      .proj-tags {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }
      .proj-bars { min-width: 0; }
      .proj-bar {
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
        display: flex;
        gap: 2px;
        background: var(--bg-elev-2);
        border: 1px solid var(--line);
        width: 100%;
      }
      .proj-bar > i { display: block; height: 100%; }
      .proj-bar > i.claude {
        background: linear-gradient(90deg, oklch(0.6 0.13 255), var(--claude));
      }
      .proj-bar > i.codex {
        background: linear-gradient(90deg, oklch(0.65 0.16 145), var(--codex));
      }
      .proj-mix {
        display: flex;
        gap: 12px;
        margin-top: 6px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-mute);
      }
      .proj-mix span {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .proj-figs {
        text-align: right;
        font-family: var(--font-mono);
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 110px;
      }
      .proj-figs .amt { font-size: 17px; font-weight: 600; }
      .proj-figs .meta { font-size: 11px; color: var(--text-mute); }
      .proj-detail {
        grid-column: 1 / -1;
        padding: 12px 6px 8px 22px;
        border-top: 1px dashed var(--line-soft);
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px 24px;
        font-family: var(--font-mono);
        font-size: 11.5px;
      }
      .proj-detail .sess {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 14px;
        padding: 4px 0;
        color: var(--text-dim);
      }
      .proj-detail .sess .when { color: var(--text-mute); }
      .proj-detail .empty {
        grid-column: 1 / -1;
        color: var(--text-mute);
      }

      /* ---- Models ------------------------------------------- */
      .models {
        background: var(--bg-elev);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      .model-row {
        display: grid;
        grid-template-columns: 220px 1fr auto;
        gap: 22px;
        align-items: center;
        padding: 14px 20px;
        border-top: 1px solid var(--line-soft);
      }
      .model-row:first-child { border-top: 0; }
      .model-row .name {
        font-family: var(--font-mono);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .model-row .ratiobar {
        height: 6px;
        border-radius: 3px;
        background: var(--bg-elev-2);
        border: 1px solid var(--line);
        position: relative;
        overflow: hidden;
      }
      .model-row .ratiobar > i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--fire-2), var(--fire-1));
      }
      .model-row.claude .ratiobar > i {
        background: linear-gradient(90deg, oklch(0.6 0.13 255), var(--claude));
      }
      .model-row.codex .ratiobar > i {
        background: linear-gradient(90deg, oklch(0.65 0.16 145), var(--codex));
      }
      .model-row .nums {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-dim);
        text-align: right;
        min-width: 280px;
      }
      .model-row .nums b {
        color: var(--text);
        font-weight: 600;
      }

      /* ---- Top-burns batch table ---------------------------- */
      /* Top-burns table — the "danger zone". Tinted warm, but only
       * just enough to read as different from the rest of the page;
       * the real signal comes from the fire-1 amount color and the
       * danger-row tint. */
      .batch {
        background: var(--bg-elev);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow:
          inset 0 1px 0 oklch(0.72 0.18 50 / 0.10),
          0 0 0 1px oklch(0.72 0.18 50 / 0.06),
          0 12px 32px -16px oklch(0.62 0.22 30 / 0.20);
      }
      .batch-head {
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line-soft);
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--text-dim);
        gap: 12px;
        flex-wrap: wrap;
      }
      .batch-head > span:last-child { color: var(--text-mute); }
      .batch-row {
        display: grid;
        grid-template-columns: 80px 100px 1.4fr 1fr 130px 28px;
        gap: 14px;
        align-items: center;
        padding: 10px 20px;
        border-top: 1px solid var(--line-soft);
        font-family: var(--font-mono);
        font-size: 12px;
        cursor: pointer;
        transition: 0.1s;
      }
      .batch-row:hover { background: var(--bg-elev-2); }
      .batch-row .amt {
        font-size: 14px;
        font-weight: 600;
        color: var(--fire-1);
      }
      .batch-row .tok { color: var(--text-soft, var(--text-dim)); }
      .batch-row .path {
        color: var(--text-soft, var(--text));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .batch-row .model { color: var(--claude); }
      .batch-row .when { color: var(--text-mute); }
      .batch-row .arr {
        color: var(--text-mute);
        text-align: right;
      }
      .batch-row.danger { background: oklch(0.62 0.22 30 / 0.06); }
      .batch-row.danger .amt { color: oklch(0.82 0.18 35); }
      :root[data-theme="light"] .batch-row.danger {
        background: oklch(0.62 0.22 30 / 0.07);
      }
      .batch-empty {
        padding: 18px 20px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-mute);
      }

      /* ---- Loading / error / empty -------------------------- */
      .loading,
      .error {
        margin-top: 22px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--bg-elev);
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-dim);
        text-align: center;
      }
      .error { border-color: oklch(0.55 0.20 25 / 0.5); color: var(--fire-1); }

      /* ---- Refresh ghost ------------------------------------ */
      .refresh {
        appearance: none;
        background: transparent;
        color: var(--text-dim);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 12px;
        font-family: var(--font-sans);
        font-size: 12px;
        cursor: pointer;
        transition: 0.12s;
      }
      .refresh:hover {
        color: var(--fire-1);
        border-color: var(--fire-2);
      }

      /* ---- zh-cn polish ------------------------------------- */
      body.locale-zh .stat .k,
      body.locale-zh .burn-label,
      body.locale-zh .heatmap-detail .day-label,
      body.locale-zh .section-h h2 {
        text-transform: none;
        letter-spacing: 0.04em;
      }

      /* ---- Responsive --------------------------------------- */
      @media (max-width: 880px) {
        .app { padding: 20px 18px 80px; }
        .burnhero { grid-template-columns: 1fr; }
        .burn-side-grid {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: 1fr;
        }
        .stat-strip { grid-template-columns: 1fr 1fr; }
        .heatmap-card { grid-template-columns: 1fr; }
        .heatmap-vsep { display: none; }
        .proj { grid-template-columns: 1fr; gap: 10px; }
        .proj-figs {
          text-align: left;
          flex-direction: row;
          gap: 14px;
          align-items: baseline;
        }
        .model-row { grid-template-columns: 1fr; gap: 8px; }
        .model-row .nums {
          text-align: left;
          min-width: 0;
        }
        .batch-row {
          grid-template-columns: 80px 1fr 28px;
        }
        .batch-row .tok,
        .batch-row .path,
        .batch-row .when {
          display: none;
        }
      }
      @media (max-width: 600px) {
        .burn-side-grid { grid-template-columns: 1fr; }
        .stat-strip { grid-template-columns: 1fr; }
        .filter-meta { display: none; }
        .burn-rate .v { font-size: 42px; }
      }
    </style>
  </head>
  <body>
    <div id="app" class="app">
      <div class="loading" data-i18n="Loading…">Loading…</div>
    </div>

    <script nonce="{{NONCE}}">{{INLINE_JS}}</script>
  </body>
</html>
