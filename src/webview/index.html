<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{NONCE}}';">
<title>Claude Cost Tracker</title>
<style>
  :root {
    --accent: #378ADD;
    --danger: var(--vscode-errorForeground, #f48771);
    --warn-bg: var(--vscode-inputValidation-warningBackground, #4a3b1a);
    --muted: var(--vscode-descriptionForeground);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    font-family: var(--vscode-font-family);
    color: var(--vscode-foreground);
    background: var(--vscode-editor-background);
    font-size: 13px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; font-weight: 600; }
  .sub { color: var(--muted); margin-bottom: 20px; font-size: 12px; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 24px; align-items: center; }
  .pill {
    background: var(--vscode-button-secondaryBackground);
    color: var(--vscode-button-secondaryForeground);
    border: 1px solid var(--vscode-panel-border);
    padding: 6px 14px; border-radius: 999px;
    cursor: pointer; font-size: 12px;
  }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .spacer { flex: 1; }
  .refresh {
    background: transparent; color: var(--muted); border: 1px solid var(--vscode-panel-border);
    padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .card {
    background: var(--vscode-editorWidget-background);
    border: 1px solid var(--vscode-panel-border);
    border-radius: 8px; padding: 18px;
  }
  .card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .card .value { font-size: 26px; font-weight: 600; }
  .card .meta { color: var(--muted); font-size: 11px; margin-top: 6px; }

  .section { margin-bottom: 28px; }
  .section h2 { font-size: 13px; font-weight: 600; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }

  .chart { width: 100%; height: 160px; background: var(--vscode-editorWidget-background); border: 1px solid var(--vscode-panel-border); border-radius: 8px; padding: 12px; }

  .project-row {
    display: grid; grid-template-columns: 1fr 90px 70px;
    gap: 12px; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--vscode-panel-border);
  }
  .project-row:last-child { border-bottom: none; }
  .project-name { font-family: var(--vscode-editor-font-family, monospace); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-wrap { background: var(--vscode-input-background); height: 6px; border-radius: 3px; overflow: hidden; }
  .bar { height: 100%; background: var(--accent); }
  .project-cost { text-align: right; font-weight: 600; }
  .project-meta { color: var(--muted); font-size: 11px; text-align: right; }

  .alerts { background: var(--warn-bg); border: 1px solid var(--vscode-inputValidation-warningBorder, #b89a4e); border-radius: 8px; padding: 14px; }
  .alert-row { padding: 6px 0; font-size: 12px; }
  .alert-row .cost { color: var(--danger); font-weight: 600; }

  .empty { text-align: center; padding: 40px; color: var(--muted); }
  .model-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; gap: 12px; }
  .model-row .name { font-family: monospace; }

  .pricing-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .pricing-meta a, .warn-banner a { color: var(--accent); text-decoration: none; }
  .pricing-meta a:hover, .warn-banner a:hover { text-decoration: underline; }
  .warn-banner {
    background: var(--warn-bg);
    border: 1px solid var(--vscode-inputValidation-warningBorder, #b89a4e);
    border-radius: 6px; padding: 10px 14px; font-size: 12px; margin-bottom: 16px;
  }
  .warn-banner code { background: rgba(0,0,0,0.2); padding: 1px 5px; border-radius: 3px; }
  .warn { color: var(--danger); }
  .warn-pill {
    display: inline-block; font-size: 10px; color: var(--danger);
    padding: 1px 6px; border: 1px solid var(--danger); border-radius: 999px; margin-left: 4px;
  }
</style>
</head>
<body>
  <h1>Claude Cost Tracker</h1>
  <div class="sub" id="generatedAt">Loading…</div>

  <div class="toolbar">
    <button class="pill" data-range="today">Today</button>
    <button class="pill active" data-range="month">This Month</button>
    <button class="pill" data-range="all">All Time</button>
    <div class="spacer"></div>
    <button class="refresh" id="refreshBtn">Refresh</button>
  </div>

  <div id="content"></div>

  <script nonce="{{NONCE}}">{{INLINE_JS}}</script>
</body>
</html>
